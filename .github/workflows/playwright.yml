name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Tự động hủy các bản chạy cũ khi có push mới (tiết kiệm tài nguyên)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm' # Bước này yêu cầu phải có file package-lock.json
        
    - name: Install dependencies
      run: npm ci # Lệnh này nhanh hơn 'npm install' và dùng file lock để cài đặt
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    - name: Upload Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }} # Đảm bảo upload report kể cả khi test fail
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30